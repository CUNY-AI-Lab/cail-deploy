services:
  build-runner:
    image: ${BUILD_WORKER_IMAGE:-kale-build-runner:local}
    build:
      context: ../..
      dockerfile: packages/build-runner/Dockerfile
    container_name: cail-build-runner
    restart: unless-stopped
    init: true
    env_file:
      - .env.runner
    environment:
      RUNNER_WORKDIR_ROOT: /var/lib/cail-build-runner/work
      RUNNER_HEALTH_PORT: 8080
      BUILD_WORKER_IMAGE: ${BUILD_WORKER_IMAGE:-kale-build-runner:local}
      BUILD_WORKER_CACHE_VOLUME: ${BUILD_WORKER_CACHE_VOLUME:-cail-build-runner-cache}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:8080/readyz').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

services:
  build-runner:
    build:
      context: ../..
      dockerfile: packages/build-runner/Dockerfile
    container_name: cail-build-runner
    restart: unless-stopped
    init: true
    env_file:
      - .env.runner
    environment:
      RUNNER_WORKDIR_ROOT: /var/lib/cail-build-runner/work
      RUNNER_HEALTH_PORT: 8080
    volumes:
      - runner-work:/var/lib/cail-build-runner
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:8080/readyz').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  runner-work:

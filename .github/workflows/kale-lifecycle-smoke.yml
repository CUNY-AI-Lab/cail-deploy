name: Kale Lifecycle Smoke

on:
  workflow_dispatch:
    inputs:
      repository:
        description: Dedicated smoke repository in owner/repo form
        required: false
        type: string
      branch:
        description: Default branch to push during the smoke run
        required: false
        type: string
  schedule:
    - cron: "30 10 * * *"

permissions:
  contents: read

concurrency:
  group: kale-lifecycle-smoke
  cancel-in-progress: false

jobs:
  lifecycle-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      KALE_BASE_URL: https://cuny.qzz.io/kale
      KALE_SMOKE_RUN_ID: gha-${{ github.run_id }}-${{ github.run_attempt }}
      DEFAULT_SMOKE_REPOSITORY: ${{ vars.KALE_LIFECYCLE_SMOKE_REPOSITORY }}
      DEFAULT_SMOKE_BRANCH: ${{ vars.KALE_LIFECYCLE_SMOKE_DEFAULT_BRANCH }}
      INPUT_SMOKE_REPOSITORY: ${{ github.event.inputs.repository }}
      INPUT_SMOKE_BRANCH: ${{ github.event.inputs.branch }}
      KALE_SMOKE_GITHUB_TOKEN: ${{ secrets.KALE_LIFECYCLE_SMOKE_GITHUB_TOKEN }}
      KALE_SMOKE_KALE_TOKEN: ${{ secrets.KALE_LIFECYCLE_SMOKE_KALE_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve smoke target
        run: |
          set -euo pipefail
          repository="${INPUT_SMOKE_REPOSITORY:-${DEFAULT_SMOKE_REPOSITORY:-}}"
          branch="${INPUT_SMOKE_BRANCH:-${DEFAULT_SMOKE_BRANCH:-main}}"
          if [ -z "$repository" ]; then
            echo "KALE_LIFECYCLE_SMOKE_REPOSITORY is not configured." >&2
            exit 1
          fi
          {
            echo "KALE_SMOKE_REPOSITORY=$repository"
            echo "KALE_SMOKE_DEFAULT_BRANCH=$branch"
          } >> "$GITHUB_ENV"

      - name: Run lifecycle smoke
        run: node scripts/ops/run-kale-lifecycle-smoke.mjs
